# GitHub Pages Jekyll Configuration
# Theme: Use GitHub's built-in Slate theme
remote_theme: pages-themes/slate@v0.2.0
plugins:
  - jekyll-remote-theme

# Site metadata
title: "PicoClaw Portable Launcher"
description: "Ultra-efficient AI agent in a portable Go binary. Setup in 30 seconds, zero host pollution. Works on Windows, macOS, Linux."
url: "https://jaberio.github.io"
baseurl: "/PicoClaw-USB-Portable"
repository: "jaberio/PicoClaw-USB-Portable"

# Author
author:
  name: "PicoClaw"
  url: "https://github.com/jaberio/PicoClaw-USB-Portable"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Exclude from build
exclude:
  - .gitignore
  - .github
  - scripts/
  - data/
  - .env
  - vendor/
  - "*.md.bak"

# Defaults for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
