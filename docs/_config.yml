# GitHub Pages Jekyll Configuration - Dark Professional Theme
# Using Hacker theme for dark mode documentation
remote_theme: pages-themes/hacker@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Site metadata
title: "PicoClaw Portable Launcher"
description: "Ultra-efficient AI agent in a portable Go binary. Setup in 30 seconds, zero host pollution. Works on Windows, macOS, Linux."
url: "https://jaberio.github.io"
baseurl: "/PicoClaw-USB-Portable"
repository: "jaberio/PicoClaw-USB-Portable"

# Author
author:
  name: "PicoClaw"
  email: "support@jaberio.dev"
  url: "https://github.com/jaberio/PicoClaw-USB-Portable"

# Theme settings
show_downloads: false
google_analytics: false

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: false

# Exclude from build
exclude:
  - .gitignore
  - .github
  - scripts/
  - data/
  - .env
  - vendor/
  - "*.md.bak"
  - Gemfile
  - Gemfile.lock

# Defaults for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
