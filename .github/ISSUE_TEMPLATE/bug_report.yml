name: Bug report
description: Something in the wrapper does not behave as documented.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete the
        repro, the faster the fix. **Do not paste API keys.**

  - type: input
    id: version
    attributes:
      label: Wrapper version
      description: Tag or commit hash of this repository.
      placeholder: v1.0.0
    validations:
      required: true

  - type: input
    id: pinned
    attributes:
      label: Pinned PicoClaw version
      description: Value of `VERSION=` in `scripts/release.config`.
      placeholder: v0.2.8
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux x86_64
        - Linux aarch64
        - Linux armv7
        - Linux armv6
        - Linux riscv64
        - Other (please describe)
    validations:
      required: true

  - type: dropdown
    id: filesystem
    attributes:
      label: Drive filesystem
      options:
        - NTFS
        - exFAT
        - FAT32
        - ext4
        - APFS
        - other / unknown
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run launch.bat
        2. Press 2 (Onboard)
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (with full output)
      description: Paste full terminal output. Redact any API keys.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: contact
    attributes:
      label: Confirmation
      options:
        - label: I confirm I removed all API keys and personal tokens from the output above.
          required: true
