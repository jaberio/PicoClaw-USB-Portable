name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Re-verify pinned hashes weekly to catch silent upstream re-rolls.
    - cron: '17 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-bash:
    name: Lint bash scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck launch.sh scripts/setup-unix.sh scripts/reset-unix.sh scripts/verify-manifest.sh
      - name: bash -n
        run: |
          bash -n launch.sh
          bash -n scripts/setup-unix.sh
          bash -n scripts/reset-unix.sh
          bash -n scripts/verify-manifest.sh

  lint-powershell:
    name: Lint PowerShell scripts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error
          if ($issues) { $issues | Format-Table -AutoSize; exit 1 }
      - name: Parse all .ps1 files
        shell: pwsh
        run: |
          $errors = 0
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $content = Get-Content -Raw $_.FullName
            $parseErrors = $null
            $tokens = $null
            $null = [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors -and $parseErrors.Count -gt 0) {
              Write-Host ("{0}: {1} error(s)" -f $_.Name, $parseErrors.Count) -ForegroundColor Red
              $errors++
            } else {
              Write-Host ("{0}: OK" -f $_.Name) -ForegroundColor Green
            }
          }
          if ($errors -gt 0) { exit 1 }

  parse-batch:
    name: Validate launch.bat
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: cmd /c launch.bat help (no-op smoke test)
        shell: cmd
        # We do not actually let setup run here because it would download a
        # ~20 MB asset. We just confirm the batch parser does not choke.
        run: |
          if not exist launch.bat exit /b 1
          findstr /R /C:"^@echo off" launch.bat >nul || exit /b 1
          echo launch.bat present and parses.

  verify-manifest:
    name: Verify pinned SHA256 hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run manifest verifier
        run: bash scripts/verify-manifest.sh
