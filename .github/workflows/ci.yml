name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Re-verify pinned hashes weekly to catch silent upstream re-rolls.
    - cron: '17 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: |
          shellcheck launch.sh scripts/setup-unix.sh scripts/reset-unix.sh scripts/verify-manifest.sh
          bash -n launch.sh scripts/setup-unix.sh scripts/reset-unix.sh scripts/verify-manifest.sh

  verify-manifest:
    name: Verify pinned SHA256 hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/verify-manifest.sh
