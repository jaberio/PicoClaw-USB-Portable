name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sanity check
        run: |
          test -f launch.bat
          test -f launch.sh
          test -f scripts/release.config
          bash scripts/verify-manifest.sh

      - name: Read pinned PicoClaw version
        id: pin
        run: |
          ver=$(awk -F= '/^VERSION=/{print $2}' scripts/release.config)
          echo "picoclaw_version=$ver" >> "$GITHUB_OUTPUT"

      - name: Build distribution archive
        run: |
          tag="${GITHUB_REF_NAME}"
          stage="PicoClaw-USB-Portable-${tag}"
          mkdir -p "dist/$stage"
          rsync -a --exclude='.git' --exclude='.github' --exclude='.cache' \
                  --exclude='data' --exclude='dist' \
                  ./ "dist/$stage/"
          cd dist
          zip -r "$stage.zip" "$stage" >/dev/null
          (cd .. && sha256sum "dist/$stage.zip" | awk '{print $1}') > "$stage.zip.sha256"
          ls -la

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Portable launcher release ${{ github.ref_name }}.
            Pinned PicoClaw upstream: **${{ steps.pin.outputs.picoclaw_version }}**.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md)
            for the full list of changes.

            ## Verifying this release

            ```bash
            sha256sum -c PicoClaw-USB-Portable-${{ github.ref_name }}.zip.sha256
            ```
          files: |
            dist/PicoClaw-USB-Portable-${{ github.ref_name }}.zip
            dist/PicoClaw-USB-Portable-${{ github.ref_name }}.zip.sha256
          draft: false
          prerelease: false
